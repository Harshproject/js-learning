<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="red">red</button><button id='green'>green</button>
</body>
<script>
    //we will change the body color on click with having to repeat the code multiple times
    function handleClick(color){
        return function(){
            document.body.style.backgroundColor=`${color}`
        }
    }
    document.getElementById('red').onclick=handleClick('red')
    document.getElementById('green').onclick=handleClick('green')
</script>
</html>
